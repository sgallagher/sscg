name: Continuous Integration (x86_64)

on: [ push, pull_request ]

jobs:
  ubuntu:
    name: Ubuntu x86_64
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - ubuntu-24.04
        compiler:
          - gcc
          - clang

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Install build dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential meson pkgconf openssl libssl-dev libpath-utils-dev libtalloc-dev help2man libpopt-dev ${{ matrix.compiler }}
        sudo apt install -y --no-install-recommends debhelper devscripts lintian
        # 18.04's debhelper is too old, we want to use compat level 12
        if grep -q 18.04 /etc/os-release; then
            sudo apt install -y -t bionic-backports debhelper
        fi

    - name: Configure build directory
      run: |
        CC=${{ matrix.compiler}} meson setup ${{ matrix.os }}

    - name: Build SSCG
      run: |
        ninja -C ${{ matrix.os }}

    - name: Run in-tree tests
      run: |
        meson test -t 5 --print-errorlogs -C ${{ matrix.os }}

    - name: Build Debian source package
      run: |
        set -ex
        mkdir deb
        # keep version number as 0 for upstream, to match debian/changelog
        git archive -o deb/sscg_0.orig.tar.gz --prefix sscg/ HEAD
        cd deb
        # unpack tar again to make sure the dist is complete and clean
        tar xf sscg_*.tar.gz
        cd sscg
        cp -r packaging/debian .

        # build source and binary package, with lintian
        debuild -e CC=${{ matrix.compiler}} -us -uc

    - name: Install built Debian binary package
      run: |
        sudo dpkg -i deb/sscg_*.deb

    - name: Smoke test installed package
      run: |
        cd /tmp/
        sscg
        openssl x509 -in service.pem -text
        openssl x509 -in ca.crt -text

  get_fedora_releases:
    name: Get Fedora Releases
    runs-on: ubuntu-latest
    steps:
      - name: Query Fedora
        id: releases
        uses: sgallagher/get-fedora-releases-action@v1
    outputs:
      stable: ${{ steps.releases.outputs.stable }}
      development: ${{ steps.releases.outputs.development }}
      active: ${{ steps.releases.outputs.active }}

  fedora:
    name: Fedora x86_64
    runs-on: ubuntu-latest
    needs: get_fedora_releases
    strategy:
      fail-fast: false
      matrix:
        release: ${{ fromJson(needs.get_fedora_releases.outputs.active) }}
        compiler:
          - gcc
          - clang

    container:
      image: quay.io/fedora/fedora:${{ matrix.release }}
      options: --security-opt seccomp=unconfined

    steps:
    - name: Identify the system
      run: |
        cat /etc/os-release

    - name: Checkout code
      uses: actions/checkout@v6

    - name: Install build dependencies
      run: |
        dnf install -y meson util-linux pkgconf openssl openssl-devel libpath_utils-devel libtalloc-devel help2man popt-devel ${{ matrix.compiler }}

    - name: Create user
      run: |
        useradd -m -s /bin/bash -G wheel sscg
        tail /etc/passwd

    - name: Make checkout directory editable by the sscg user
      run: |
        chown -R sscg:wheel ${GITHUB_WORKSPACE}

    - name: Configure build directory
      run: |
        CC=${{ matrix.compiler}} su -c "meson setup fedora-${{ matrix.release }}" sscg

    - name: Build SSCG
      run: |
        su -c "ninja -C fedora-${{ matrix.release }}" sscg

    - name: Run in-tree tests
      run: |
        su -c "meson test -t 5 --print-errorlogs -C fedora-${{ matrix.release }}" sscg


  centos-stream:
    name: CentOS Stream x86_64
    runs-on: ubuntu-latest
    continue-on-error: false

    strategy:
      fail-fast: false
      matrix:
        release:
          - 9
          - 10
        compiler:
          - gcc
          - clang

    container:
      image: quay.io/centos/centos:stream${{ matrix.release }}
      options: --security-opt seccomp=unconfined

    steps:
    - name: Identify the system
      run: |
        cat /etc/os-release

    - name: Checkout code
      uses: actions/checkout@v6

    - name: Enable DNF tools
      run: |
        yum -y install dnf-plugins-core

    - name: Enable CRB
      run: |
        yum config-manager --set-enabled crb

    - name: Install build dependencies
      run: |
        yum install -y meson util-linux pkgconf-pkg-config openssl openssl-devel libpath_utils-devel libtalloc-devel help2man popt-devel ${{ matrix.compiler }}

    - name: Create user
      run: |
        useradd -m -s /bin/bash -G wheel sscg
        tail /etc/passwd

    - name: Make checkout directory editable by the sscg user
      run: |
        chown -R sscg:wheel ${GITHUB_WORKSPACE}

    - name: Configure build directory
      run: |
        CC=${{ matrix.compiler}} su -c "meson setup --errorlogs centos-stream-${{ matrix.release }}" sscg || ( cat centos-stream-${{ matrix.release }}/meson-logs/meson-log.txt && exit 1 )

    - name: Build SSCG
      run: |
        su -c "ninja -C centos-stream-${{ matrix.release }}" sscg

    - name: Run in-tree tests
      run: |
        su -c "meson test -t 5 --print-errorlogs -C centos-stream-${{ matrix.release }}" sscg

  centos-stream-generate-certs:
    name: CentOS Stream generate certs (${{ matrix.key-type }}-${{ matrix.crypto_policy }})
    runs-on: ubuntu-latest
    needs: centos-stream
    strategy:
      fail-fast: false
      matrix:
        key-type:
          - rsa
          - ecdsa
          - mldsa
        crypto_policy:
          - default
          - pq
        exclude:
          - key-type: rsa
            crypto_policy: pq
          - key-type: ecdsa
            crypto_policy: pq

    container:
      image: quay.io/centos/centos:stream9
      options: --security-opt seccomp=unconfined

    steps:
    - name: Identify the system
      run: |
        cat /etc/os-release

    - name: Checkout code
      uses: actions/checkout@v6

    - name: Enable DNF tools
      run: |
        yum -y install dnf-plugins-core

    - name: Enable CRB
      run: |
        yum config-manager --set-enabled crb

    - name: Install build dependencies
      run: |
        yum install -y meson util-linux pkgconf-pkg-config openssl openssl-devel libpath_utils-devel libtalloc-devel help2man popt-devel gcc

    - name: Create user
      run: |
        useradd -m -s /bin/bash -G wheel sscg
        tail /etc/passwd

    - name: Make checkout directory editable by the sscg user
      run: |
        chown -R sscg:wheel ${GITHUB_WORKSPACE}

    - name: Configure build directory
      run: |
        CC=gcc su -c "meson setup --errorlogs centos-stream-9" sscg || ( cat centos-stream-9/meson-logs/meson-log.txt && exit 1 )

    - name: Build SSCG
      run: |
        su -c "ninja -C centos-stream-9" sscg

    - name: Generate certs with sscg
      run: |
        su -c "cd ${GITHUB_WORKSPACE} && ./centos-stream-9/sscg --key-type ${{ matrix.key-type }} --ca-file=ca.crt --cert-file=service.pem --cert-key-file=service-key.pem" sscg

    - name: Upload cert artifacts
      uses: actions/upload-artifact@v4
      with:
        name: certs-${{ matrix.key-type }}-${{ matrix.crypto_policy }}
        path: |
          ca.crt
          service.pem
          service-key.pem

  centos-stream-ssl-test:
    name: CentOS Stream SSL test (${{ matrix.key-type }}-${{ matrix.crypto_policy }})
    runs-on: ubuntu-latest
    needs: centos-stream-generate-certs
    strategy:
      fail-fast: false
      matrix:
        key-type:
          - rsa
          - ecdsa
          - mldsa
        crypto_policy:
          - default
          - pq
        exclude:
          - key-type: rsa
            crypto_policy: pq
          - key-type: ecdsa
            crypto_policy: pq

    steps:
    - name: Download cert artifacts
      uses: actions/download-artifact@v4
      with:
        name: certs-${{ matrix.key-type }}-${{ matrix.crypto_policy }}
        path: certs

    - name: Start openssl s_server
      run: |
        docker network create sslnet || true
        SERVER_CMD='openssl s_server -accept 8080 -cert /certs/service.pem -key /certs/service-key.pem -CAfile /certs/ca.crt -naccept 1 -debug -msg'
        if [ "${{ matrix.crypto_policy }}" = "pq" ]; then
          SERVER_CMD='update-crypto-policies --set DEFAULT:PQ && '"$SERVER_CMD"
        fi
        docker run -d --name sslserver --network sslnet -v ${{ github.workspace }}/certs:/certs -p 8080:8080 quay.io/centos/centos:stream9 bash -c "$SERVER_CMD"

    - name: Wait for server
      run: sleep 3

    - name: Run openssl s_client
      run: |
        CLIENT_CMD='echo | openssl s_client -connect sslserver:8080 -CAfile /certs/ca.crt -debug -msg -verify_return_error'
        if [ "${{ matrix.crypto_policy }}" = "pq" ]; then
          CLIENT_CMD='update-crypto-policies --set DEFAULT:PQ && '"$CLIENT_CMD"
        fi
        docker run --rm --network sslnet -v ${{ github.workspace }}/certs:/certs quay.io/centos/centos:stream9 bash -c "$CLIENT_CMD"

  fedora-eln:
    name: Fedora ELN x86_64
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler:
          - gcc
          - clang

    container:
      image: quay.io/fedora/eln:latest
      options: --security-opt seccomp=unconfined

    steps:
    - name: Identify the system
      run: |
        cat /etc/os-release

    - name: Checkout code
      uses: actions/checkout@v6

    - name: Install build dependencies
      run: |
        dnf install -y meson util-linux pkgconf openssl openssl-devel libpath_utils-devel libtalloc-devel help2man popt-devel shadow-utils ${{ matrix.compiler }}

    - name: Create user
      run: |
        useradd -m -s /bin/bash -G wheel sscg
        tail /etc/passwd

    - name: Make checkout directory editable by the sscg user
      run: |
        chown -R sscg:wheel ${GITHUB_WORKSPACE}

    - name: Configure build directory
      run: |
        CC=${{ matrix.compiler}} su -c "meson setup fedora-eln" sscg

    - name: Build SSCG
      run: |
        su -c "ninja -C fedora-eln" sscg

    - name: Run in-tree tests
      run: |
        su -c "meson test -t 5 --print-errorlogs -C fedora-eln" sscg
